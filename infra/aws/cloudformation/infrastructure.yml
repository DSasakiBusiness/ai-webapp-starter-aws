AWSTemplateFormatVersion: '2010-09-09'
Description: AI Webapp Starter - AWS Infrastructure (App Runner + RDS)

Parameters:
  Environment:
    Type: String
    Default: staging
    AllowedValues: [staging, production]
  DBInstanceClass:
    Type: String
    Default: db.t3.micro
  AppRunnerCpu:
    Type: String
    Default: '1024'
  AppRunnerMemory:
    Type: String
    Default: '2048'

Resources:
  # --- VPC ---
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: !Sub 'ai-webapp-${Environment}-vpc'

  PrivateSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - Key: Name
          Value: !Sub 'ai-webapp-${Environment}-private-a'

  PrivateSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      Tags:
        - Key: Name
          Value: !Sub 'ai-webapp-${Environment}-private-b'

  # --- RDS ---
  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Subnet group for AI Webapp RDS
      SubnetIds:
        - !Ref PrivateSubnetA
        - !Ref PrivateSubnetB

  DBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for AI Webapp RDS
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          SourceSecurityGroupId: !Ref AppSecurityGroup

  Database:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceIdentifier: !Sub 'ai-webapp-${Environment}'
      Engine: postgres
      EngineVersion: '16'
      DBInstanceClass: !Ref DBInstanceClass
      AllocatedStorage: 20
      StorageType: gp3
      DBName: ai_webapp
      MasterUsername: postgres
      ManageMasterUserPassword: true
      VPCSecurityGroups:
        - !Ref DBSecurityGroup
      DBSubnetGroupName: !Ref DBSubnetGroup
      BackupRetentionPeriod: 7
      DeletionProtection: true
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # --- Security Group for App ---
  AppSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for AI Webapp App
      VpcId: !Ref VPC

  # --- ECR ---
  ECRRepositoryApi:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub 'ai-webapp-api-${Environment}'
      ImageScanningConfiguration:
        ScanOnPush: true
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [{
              "rulePriority": 1,
              "description": "Keep last 10 images",
              "selection": {
                "tagStatus": "any",
                "countType": "imageCountMoreThan",
                "countNumber": 10
              },
              "action": { "type": "expire" }
            }]
          }

  ECRRepositoryWeb:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub 'ai-webapp-web-${Environment}'
      ImageScanningConfiguration:
        ScanOnPush: true
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [{
              "rulePriority": 1,
              "description": "Keep last 10 images",
              "selection": {
                "tagStatus": "any",
                "countType": "imageCountMoreThan",
                "countNumber": 10
              },
              "action": { "type": "expire" }
            }]
          }

Outputs:
  VpcId:
    Value: !Ref VPC
  DatabaseEndpoint:
    Value: !GetAtt Database.Endpoint.Address
  DatabasePort:
    Value: !GetAtt Database.Endpoint.Port
  ECRRepositoryApiUri:
    Value: !GetAtt ECRRepositoryApi.RepositoryUri
  ECRRepositoryWebUri:
    Value: !GetAtt ECRRepositoryWeb.RepositoryUri
